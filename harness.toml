# Fleet configuration for the local model servers.

[server]
host = "0.0.0.0"   # listen on all interfaces (LAN + Tailscale); no auth, keep off untrusted networks
port = 8484

[[backends]]
name = "qwen35"
kind = "vllm"
base_url = "http://192.168.0.33:8000/v1"
model = "qwen36-35b-heretic"  # Qwen3.6-35B-A3B MoE: ~3B active params + Heretic abliteration
profile = "qwen"
context_window = 262144
roles = ["fast", "subagent"]
max_in_flight = 1  # GB10 sustains exactly one request even though vLLM accepts more

[[backends]]
name = "qwen27"
kind = "vllm"
base_url = "http://192.168.0.196:8000/v1"
model = "qwen3.6-27b"
profile = "qwen"
context_window = 262144
roles = ["main"]
max_in_flight = 2

[[backends]]
name = "qwen80-thinking"
kind = "vllm"
base_url = "http://192.168.0.196:8001/v1"
model = "qwen3-next-80b-a3b-thinking"  # Reasoning-only Qwen3-Next Thinking model
profile = "qwen"
context_window = 262144
roles = ["reasoning", "plan", "review", "critic"]
capabilities = ["reasoning", "reasoning_budget"]
max_in_flight = 1

[debug]
dump_prompts = false

[traces]
enabled = true

[pipeline]
system_prompt = "replace"
tool_prune = true
max_tools = 8
fewshot = true
repair_retries = 2
recent_turns_protected = 4
reasoning = "thinking"

[cache]
enabled = true
ttl_s = 600
roles = ["fast"]

[reasoning_budget]
enabled = true
default_tokens = 1024
max_auto_tokens = 8192
max_manual_tokens = 32768
final_answer_reserve = 4096
load_shed = true
fallback_when_unavailable = "degrade"

[critic]
enabled = true
max_chars = 12000
max_tokens = 1200
min_tool_calls = 1
triggers = ["risky_path", "edit", "build_failure", "test_failure", "tool_error"]

[reasoning_budget.role_tokens]
reasoning = 2048
plan = 4096
review = 2048
critic = 4096

[reasoning_budget.mode_tokens]
file_edit = 1024
hard_file_edit = 4096
project_survey = 8192
architecture_plan = 16384
deep_architecture_plan = 32768
integration_debug = 8192
kernel_change_plan = 16384
kernel_critic = 8192

[[risk_profiles]]
name = "kernel"
path_patterns = ["kernel/**", "drivers/**", "fs/**", "mm/**", "net/**", "include/linux/**"]
text_patterns = ["spinlock", "mutex", "rcu", "atomic", "refcount", "dma", "uaccess", "ioctl"]
plan_mode = "kernel_change_plan"
critic_mode = "kernel_critic"

[[risk_profiles]]
name = "c_api_refactor"
path_patterns = ["**/*.h", "**/*.c"]
text_patterns = ["struct ", "typedef", "extern ", "static inline", "#define"]
plan_mode = "architecture_plan"
critic_mode = "critic"

[log]
requests_path = "logs/requests.jsonl"
